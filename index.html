<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quizy Math | Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      /* 🌙 Dark Mode Colors */
      --bg1: #0f1413;
      --bg2: #17201f;
      --bg3: #24302f;
      --text: #e6f0ec;
      --muted: #b8c2bf;
      --card-bg: rgba(255, 255, 255, 0.07);
      --panel-bg: rgba(30, 40, 39, 0.85);
      --accent: #13523af6;
      --accent2: #6ee7b7;
      --btn-bg: #2d3c37;
      --btn-bg-hover: #3d4d48;
      --pulse: rgba(110, 231, 183, 0.2);
    }

    body.light-mode {
      --bg1: #4a745c;
      --bg2: #0c5a37;
      --bg3: #294e3d;
      --text: #000000;
      --card-bg: rgba(6, 114, 109, 0.534);
      --panel-bg: rgba(50, 56, 55, 0.411);
      --btn-bg: #648d7b;
      --accent: #0c2016e0;
      --accent2: #5ba980;
    }
   
    #startBtn {
      color: #23b194b9;
      border: none;
      border-radius: 18px;
      padding: 14px 0;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 300% 300%;
      animation: slowGradient 15s ease infinite;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.8s, color 0.5s;
    }

    @keyframes slowGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* خلفية تفاعلية تتحرك مع الماوس */
    .floating-bg {
      position: fixed;
      inset: -50px;
      background: radial-gradient(circle at 10% 20%, rgba(110,231,183,0.06), transparent 25%),
                  radial-gradient(circle at 80% 80%, rgba(158,195,177,0.04), transparent 25%);
      z-index: 0;
      pointer-events: none;
    }

    .main_div { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }

    /* Profile Bar */
    .profile-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--panel-bg); padding: 12px 25px; width: 100%;
      backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .profile-info { display: flex; align-items: center; gap: 15px; }
    #profilePhoto { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; cursor: pointer; transition: 0.3s; }
    #profilePhoto:hover { transform: rotate(10deg) scale(1.1); }

    /* XP Badge */
    .xp-badge { background: var(--btn-bg); padding: 5px 12px; border-radius: 20px; font-weight: bold; color: var(--accent2); font-size: 0.85rem; border: 1px solid rgba(110,231,183,0.2); }

    /* Home Container */
    .container.home {
      background: var(--card-bg); padding: 40px; margin-top: 50px;
      max-width: 500px; width: 90%; border-radius: 24px; text-align: center;
      backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    h1 { font-size: 1.8rem; margin-bottom: 10px; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    select, button {
      width: 100%; max-width: 320px; padding: 14px; margin: 12px 0;
      border-radius: 15px; border: 1px solid rgba(0, 0, 0, 0.932);
      background: var(--btn-bg); color: var(--text); font-size: 1rem;
      cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    button { background: var(--accent); color: #1a1f1e; font-weight: bold; border: none; }
    button:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 20px rgba(110,231,183,0.3); }

    .timer { margin-top: 15px; font-weight: 600; color: var(--accent); letter-spacing: 1px; }

    /* Welcome Modal */
    .welcome-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
      display: none; place-items: center; z-index: 1000;
    }
    .welcome-card {
      background: var(--bg2); padding: 30px; border-radius: 20px; text-align: center;
      max-width: 400px; border: 1px solid var(--accent);
    }

    .tot { margin-top: 30px; opacity: 0.7; transition: 0.3s; }
    .tot:hover { opacity: 1; }
    #link { color: var(--accent); text-decoration: none; font-weight: bold; }

    /* Switch Style */
    .switch { position: relative; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #333; border-radius: 34px; cursor: pointer; transition: 0.4s; }
    .slider:before { position: absolute; content: "🌙"; height: 18px; width: 18px; left: 4px; bottom: 4px; background: rgb(231, 15, 15); border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: 0.4s; }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider:before { transform: translateX(24px); content: "🌞"; }

  </style>
</head>
<body>
  <div class="floating-bg" id="fluidBg"></div>

  <div class="main_div">
    <div class="profile-bar">
      <div class="profile-info">
        <img id="profilePhoto" src="images/default-profile.png" alt="Profile" onclick="awardPoints(1)">
        <div class="profile-details">
          <span id="profileName">👤 Guest</span>
          <div style="display: flex; gap: 8px; align-items: center;">
            <span class="xp-badge">XP: <span id="xpPoints">0</span></span>
            <a href="settings.html" style="color: var(--muted); text-decoration: none; font-size: 0.8rem;">⚙️ Settings</a>
          </div>
        </div>
      </div>
      
      <div style="display: flex; align-items: center; gap: 15px;">
        <div id="clock" style="font-weight: 600; font-size: 0.9rem; color: var(--accent);">🕒 --:--</div>
        <label class="switch">
          <input type="checkbox" id="themeSwitch" onchange="toggleThemeSwitch(this)">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="container home">
      <div id="quote" style="font-style: italic; margin-bottom: 20px; font-size: 0.9rem; min-height: 40px;">“Mathematics is the music of reason.” 🎵</div>
      
      <h1>🎓 Quizy Math</h1>
      <p>Elevate your logic with calm challenges.</p>

      <label>Category</label>
      <select id="category">
        <option value="algebra">🧮 Algebra</option>
        <option value="geometry">📐 Geometry</option>
        <option value="trigonometry">📏 Trigonometry</option>
      </select>

      <label>Difficulty</label>
      <select id="difficulty">
        <option value="easy">🟢 Easy</option>
        <option value="medium">🟡 Medium</option>
        <option value="hard">🔴 Hard</option>
      </select>

      <button id="startBtn" onclick="startQuiz()">Start Journey 🚀</button>

      <div class="timer" id="mainTimer">⏳ 00:00</div>

      <footer style="margin-top: 20px;">
        <a href="score.html" style="color: var(--accent); text-decoration: none; font-size: 0.9rem;">📊 View Scoreboard</a>
      </footer>
    </div>

    <div class="tot">
      <p style="margin:0; font-size: 0.8rem;">TOTORAL VIDEO</p>
      <a id="link" href="TOT.html">Click Here to Watch</a>
    </div>
  </div>

  <div class="welcome-modal" id="welcomeModal">
    <div class="welcome-card">
      <h2 style="color: var(--accent);">أهلاً بك مجدداً!</h2>
      <p style="color: var(--text);">جاهز لتنشيط عقلك اليوم؟ ابدأ الآن واحصل على نقاط XP.</p>
      <button onclick="closeModal()" style="width: auto; padding: 10px 30px;">ابدأ الآن</button>
    </div>
  </div>

  <script>
    // --- Logic & Interactions ---
    
    function playClick() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(500, ctx.currentTime);
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.1);
    }

    function startQuiz() {
      playClick();
      const btn = document.getElementById("startBtn");
      btn.innerHTML = "Preparing... 🧠";
      btn.style.opacity = "0.7";
      
      const difficulty = document.getElementById("difficulty").value;
      const category = document.getElementById("category").value;
      localStorage.setItem("difficulty", difficulty);
      localStorage.setItem("category", category);
      
      awardPoints(10);
      setTimeout(() => { window.location.href = "quiz.html"; }, 1000);
    }

    function awardPoints(n) {
      let xp = parseInt(localStorage.getItem('xp')) || 0;
      xp += n;
      localStorage.setItem('xp', xp);
      document.getElementById('xpPoints').textContent = xp;
    }

    function toggleThemeSwitch(checkbox) {
      playClick();
      document.body.classList.toggle("light-mode", checkbox.checked);
      localStorage.setItem("theme", checkbox.checked ? "light" : "dark");
    }

    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      const m = now.getMinutes().toString().padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById("clock").textContent = `🕒 ${h}:${m} ${ampm}`;
    }

    // Interactive Background Movement
    window.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      document.getElementById('fluidBg').style.transform = `translate(${x}px, ${y}px)`;
    });

    function closeModal() {
      playClick();
      document.getElementById('welcomeModal').style.display = 'none';
    }

    // Initialize
    document.addEventListener("DOMContentLoaded", () => {
      // Load Profile & XP
      document.getElementById("profileName").textContent = `👤 ${localStorage.getItem("username") || "Guest"}`;
      document.getElementById("xpPoints").textContent = localStorage.getItem("xp") || 0;
      if(localStorage.getItem("profilePhoto")) document.getElementById("profilePhoto").src = localStorage.getItem("profilePhoto");
      
      // Theme
      if(localStorage.getItem("theme") === "light") {
        document.body.classList.add("light-mode");
        document.getElementById("themeSwitch").checked = true;
      }

      // Show Modal if first time this session
      if(!sessionStorage.getItem('welcomed')) {
        document.getElementById('welcomeModal').style.display = 'grid';
        sessionStorage.setItem('welcomed', 'true');
      }

      setInterval(updateClock, 1000);
      updateClock();

      // Quotes Rotation
      const quotes = [
        "“Mathematics is the music of reason.” 🎵",
        "“Focus + Patience = Mastery.” 🧘‍♂️",
        "“Your brain is your best calculator.” 🧠",
        "“Quiet mind, sharp mind.” 🌙"
      ];
      setInterval(() => {
        const qElem = document.getElementById("quote");
        qElem.style.opacity = 0;
        setTimeout(() => {
          qElem.textContent = quotes[Math.floor(Math.random() * quotes.length)];
          qElem.style.opacity = 1;
        }, 500);
      }, 8000);
    });
  </script>
</body>
</html>
