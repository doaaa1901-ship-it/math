<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Totoral Videos & Photos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }

    header {
      background-color: #233530;
      color: white;
      text-align: center;
      padding: 20px 0;
    }

    .content {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      border-bottom: 2px solid #0f411f;
      padding-bottom: 10px;
    }

    .video-gallery, .photo-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    video, img {
      width: 100%;
      border-radius: 8px;
      object-fit: cover;
    }

    .photo-gallery img {
      cursor: pointer;
      transition: transform 0.2s;
    }

    .photo-gallery img:hover {
      transform: scale(1.05);
    }

    /* ---------- Fullscreen Image Viewer ---------- */
    #fullscreen-view {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 9999;
    }

    #fullscreen-view.active {
      opacity: 1;
      pointer-events: auto;
    }

    #fullscreen-view img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }
  .back {
  text-align: center;
  margin-top: 30px;
}

#back {
  display: inline-block;
  background-color: #1d803d; /* matches your site accent */
  color: white;
  text-decoration: none;
  padding: 10px 25px;
  border-radius: 6px;
  font-weight: bold;
  transition: background-color 0.3s ease, transform 0.2s ease;
}

#back:hover {
  background-color: #233530; /* darker shade on hover */
  transform: scale(1.05);
}

  </style>
</head>
<body>
  <header>
    <h1>Totoral Videos & Photos</h1>
  </header>

  <div class="content">
    <section>
      <h2>Videos</h2>
      <div class="video-gallery">
        <video controls>
          <source src="Coming Soon (1).mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <video controls>
          <source src="Coming Soon (1).mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      </div>
    </section>

    <section>
      <h2>Photos</h2>
      <div class="photo-gallery">
        <img src="2.png" alt="Totoral view 1" class="gallery-img">
        <img src="3.png" alt="Totoral view 2" class="gallery-img">
        <img src="4.png" alt="Totoral view 3" class="gallery-img">
        <img src="5.png" alt="Totoral view 4" class="gallery-img">
      </div>
    </section>
  <div class="back">
  <a id="back" href="index.html">⬅ Turn Back</a>
 </div>
</div>

  <!-- Fullscreen overlay -->
  <div id="fullscreen-view">
    <img id="fullscreen-img" src="" alt="">
  </div>

  <script>
    const fullscreenView = document.getElementById("fullscreen-view");
    const fullscreenImg = document.getElementById("fullscreen-img");

    document.querySelectorAll(".photo-gallery img").forEach(img => {
      img.addEventListener("click", () => {
        fullscreenImg.src = img.src;
        fullscreenView.classList.add("active");
      });
    });

    // Close fullscreen when clicking outside or on the image
    fullscreenView.addEventListener("click", (e) => {
      // Prevent immediate close if the image is clicked
      if (e.target === fullscreenView) {
        fullscreenView.classList.remove("active");
        fullscreenImg.src = "";
      }
    });
  </script>
</body>
</html>
