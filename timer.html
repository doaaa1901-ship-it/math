<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Your Inbox</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f5f7fa;margin:0;display:flex;justify-content:center;align-items:center;height:100vh}
    .card{background:#fff;padding:30px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.08);text-align:center;max-width:400px;width:100%}
    h2{color:#333;margin-bottom:10px}
    p{color:#555;font-size:15px}
    a.button{display:inline-block;margin-top:20px;padding:12px 24px;background:#4CAF50;color:#fff;text-decoration:none;border-radius:8px;font-weight:bold;transition:.2s}
    a.button:hover{background:#43a047}
    .hint{margin-top:12px;color:#888;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Check Your Inbox 📬</h2>
    <p>We’ve sent you a verification email. Click below to open your inbox and verify your account.</p>
    <a id="inboxLink" href="https://mail.google.com/" class="button" target="_blank">Open Inbox</a>
    <p class="hint">Didn’t get it? Check your spam folder.</p>
  </div>
  <script>
    const email = new URLSearchParams(window.location.search).get("email") || "";
    const link = document.getElementById("inboxLink");
    if (email.includes("@gmail.com")) link.href = "https://mail.google.com/";
    else if (email.includes("@outlook.com") || email.includes("@hotmail.com") || email.includes("@live.com")) link.href = "https://outlook.live.com/mail/inbox";
    else if (email.includes("@yahoo.com")) link.href = "https://mail.yahoo.com/";
    else link.href = "https://www.google.com/";
  </script>
</body>
</html>
