<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quizy Math | Quiz</title>
  <link rel="stylesheet" href="../mathproject waiting for new upd/style.css">
  <script src="quiz.js" defer></script>
  <style>
    /* 🌿 General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #2b3532, #4d6c48);
      color: #5c5f5e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: background 0.6s ease, color 0.6s ease;
    }

    body.dark {
      background: linear-gradient(135deg, #21473c, #20433f, #2c6441);
      color: #e4e4e4;
    }

    /* 🧠 Container */
    .container.quiz {
      background: rgba(140, 170, 157, 0.9);
      border-radius: 16px;
      padding: 30px 40px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 600px;
      backdrop-filter: blur(10px);
      transition: background 0.6s ease;
    }

    body.dark .container.quiz {
      background: rgba(109, 136, 146, 0.721);
    }

    /* 🧭 Header */
    header {
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      animation: fadeInDown 0.8s ease;
    }

    header h1 {
      font-size: 1.8rem;
      color: #1d5726;
      letter-spacing: 1px;
    }

    body.dark header h1 {
      color: #a8dadc;
    }

    /* 🕓 Timer & Score */
    #timer, #scoreDisplay {
      color: black;
      margin: 10px 0;
      font-weight: 600;
      animation: fadeIn 1.2s ease;
    }

    /* 📈 Progress Bar */
    #progressBarContainer {
      width: 100%;
      background-color: rgba(0,0,0,0.1);
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #af4c4c, #a26155);
      transition: width 0.4s ease;
    }

    /* 📘 Question */
    #questionText {
      margin: 25px 0 10px;
      font-size: 1.3rem;
      text-align: center;
      font-weight: 500;
      animation: fadeIn 0.8s ease;
    }

    #questionImg {
      display: block;
      max-width: 80%;
      margin: 15px auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      animation: zoomIn 0.6s ease;
    }

    /* ✨ Options */
    .options {
      display: grid;
      gap: 10px;
      margin: 15px 0;
      animation: fadeIn 1s ease;
    }

    .options button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6f9b83, #6f8977);
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s ease, background 0.3s ease;
    }

    .options button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #2f3536, #3b7749);
    }

    body.dark .options button {
      background: linear-gradient(135deg, #173929c8, #20432dc5);
      color: #ffffff81;
    }

    body.dark .options button:hover {
      background: linear-gradient(135deg, #1f4037, #2c5140);
      color: #000;
    }

    /* 🧭 Buttons */
    .skip-btn, .hint-btn, .show-btn {
      margin: 10px 5px;
      padding: 10px 16px;
      font-size: 0.9rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .skip-btn { background-color: #888; color: #fff; }
    .hint-btn { background-color: #685f42ba; color: #000; }
    .show-btn { background-color: #425468; color: #e6caca; }

    .skip-btn:hover, .hint-btn:hover, .show-btn:hover {
      transform: scale(1.05);
    }

    /* 💡 Feedback */
    #feedback {
      margin-top: 15px;
      font-weight: 600;
      text-align: center;
    }

    /* 🌙 Toggle */
    .theme-toggle {
      position: absolute;
      top: 15px;
      right: 20px;
      background: #ccc;
      border-radius: 30px;
      width: 50px;
      height: 25px;
      cursor: pointer;
      transition: background 0.4s;
    }

    .theme-toggle::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 4px;
      width: 19px;
      height: 19px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.4s;
    }

    body.dark .theme-toggle {
      background: #333;
    }

    body.dark .theme-toggle::after {
      transform: translateX(24px);
    }

    /* ✨ Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    /* 📱 Responsive */
    @media (max-width: 600px) {
      .container.quiz {
        padding: 20px;
      }
      header h1 {
        font-size: 1.4rem;
      }
      .options button {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="container quiz">
    <header>
      <div class="theme-toggle" onclick="toggleTheme()"></div>
      <h1>🧮 Quiz In Progress</h1>
      <div id="timer">⏰ Time: <span id="timeNow">--:--</span></div>
      <div id="scoreDisplay">Score: 0</div>
      <div id="progressBarContainer"><div id="progressBar"></div></div>
    </header>

    <section id="questionSection">
      <img id="questionImg" src="" alt="Question Image" class="hidden" />
      <h2 id="questionText">Loading...</h2>
      <div class="options" id="optionsContainer"></div>
      <div id="feedback"></div>
      <button id="skipBtn" class="skip-btn">⏭️ Skip</button>
      <button id="hintBtn" class="hint-btn">💡 Hint</button>
      <button id="showQuestionBtn" class="show-btn">📖 Show</button>
    </section>
  </div>

  <audio id="correctSound" src="correct-choice-43861.mp3"></audio>
  <audio id="wrongSound" src="wrong-47985.mp3"></audio>

  <script>
    // 🕓 Live Clock
    function updateClock() {
      const now = new Date();
      let h = now.getHours(), m = now.getMinutes().toString().padStart(2, "0");
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById("timeNow").textContent = `${h}:${m} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 🌙 Theme Toggle
    function toggleTheme() {
      document.body.classList.toggle("dark");
      localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    }
    // Load saved theme
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
    }
  </script>
</body>
</html>
